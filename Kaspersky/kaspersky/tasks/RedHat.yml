- name: Install EPEL release
  raw: yum install -y epel-release

- name: Install Python 3.8
  raw: yum install -y python38 python38-libs python38-devel python38-pip

- name: Switch python3 alternative to python3.8
  raw: alternatives --install /usr/bin/python3 python3 /usr/bin/python3.8 2

- name: Check if KESL is already installed
  stat:
    path: /opt/kaspersky/kesl/bin/kesl-control
  register: kesl_installed
  tags: always

- name: Check agent URL
  uri:
    url: "{{ agent_url }}"
    method: GET
    return_content: no
    timeout: 30
    validate_certs: no
  register: agent_url_check
  tags: agent

- name: Download and install agent (RHEL)
  block:
    - name: Force install packages via raw yum
      raw: yum install -y {{ item }}
      loop:
        - wget
        - curl
        - perl
        - libstdc++
        - glibc
      args:
        executable: /bin/bash

    - name: Download agent package
      get_url:
        url: "{{ agent_url }}"
        dest: "{{ temp_dir_linux }}/agent"
        mode: '0755'

    - name: Install agent
      command: sh "{{ temp_dir_linux }}/agent"

    - name: Clean up agent package
      file:
        path: "{{ temp_dir_linux }}/agent"
        state: absent
      when: not kesl_installed.stat.exists

    - name: Download antivirus package
      get_url:
        url: "{{ antivirus_url }}"
        dest: "{{ temp_dir_linux }}/antivirus"
        mode: '0755'

    - name: Install antivirus
      command: sh "{{ temp_dir_linux }}/antivirus"

    - name: Clean up antivirus package
      file:
        path: "{{ temp_dir_linux }}/antivirus"
        state: absent
  when: not kesl_installed.stat.exists and agent_url_check.stat.exists

- name: Show message if KESL is already installed
  debug:
    msg: "KESL is already installed. Skipping installation."
  when: kesl_installed.stat.exists
  tags: always